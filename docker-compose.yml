services:
  postgres:
    image: postgres:16-alpine
    container_name: wolvio_poc_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: wolvio
      POSTGRES_PASSWORD: wolvio_dev
      POSTGRES_DB: billing_poc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations/0001_init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./supabase/seed/wpi_index.sql:/docker-entrypoint-initdb.d/02_wpi_seed.sql
      - ./supabase/seed/demo_contracts.sql:/docker-entrypoint-initdb.d/03_demo_contracts.sql

volumes:
  postgres_data:
